project_name: "String"
global_word_target: 50000

# The immutable brief dictates tone, audience, and kill signals.
brief_path: "templates/immutable_brief.md"

# The decision ledger tracks locked-in narrative/structural choices.
ledger_path: "templates/decision_ledger.md"

chapters:
  - id: "ch01"
    title: "String"
    status: "pending" # pending, researched, drafted, edited, locked
    target_words: 3000
    core_promise: "The singular takeaway the reader must have by the end of this chapter."
    
    # Context injected into the Drafter's prompt
    prerequisites: [] # Chapter IDs that must be summarized before this one
    
    # Structural outline for the Drafter
    key_beats:
      - "Beat 1: The current failure mode"
      - "Beat 2: The structural reason it fails"
      - "Beat 3: Introduction of the new framework"
      
    # Targets for the Scout agent to find and structure
    required_assets:
      - "Specific data point proving the failure mode"
      - "Case study of the framework in action"
      
    # State tracking
    artifacts:
      research_file: "output/ch01_research.md"
      draft_file: "output/ch01_draft.md"
      final_file: "output/ch01_final.md"
      summary_file: "output/ch01_summary.md"
